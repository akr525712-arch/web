<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
    }
    body{
        width: 100%;
        height: 100vh;
        gap: 10px;
    }
    .header {
        width: 100%;
        height: 20%;
        grid-area: header;
        background-color: rgb(21, 166, 206);
    }
    .main-content {
        width: 100%;
        height:60%;
        grid-area: main;
        background-color: rgb(79, 74, 74);
        display: flex;
    }
    .sidebar {
        width: 10% ;
        height: 100%;           
        grid-area: sidebar;
        background-color: rgb(79, 74, 74);
        }
     .ads {
        width: 90%;
        height: 100%;
        grid-area: ads;
        background-color:rgb(79, 74, 74);
        
     }
     .content-1 {
        width: 100%;
        height: 50%;
        background-color: rgb(162, 17, 109);
     }
     .content-2 {
        width: 100%;
        height: 0100%;
        grid-template-areas:
        "child-1 child-2";
        display: flex;
        
     }
     .child-1 {
        width: 50%;
        height: 50%;
        background-color: rgb(73, 41, 62);
     }
     .child-2 {
        width: 50%;
        height: 50%;
        background-color: rgb(0, 0, 0);
     }
     footer{
        width: 100%;
        height: 20%;
        grid-area: footer;
        background-color:rgb(251, 0, 4);
     }
</style>
<body>
    <header class="header"></header>
    <main class="main-content">
        <div class="sidebar"></div>
        <div class="ads">
            <div class="content-1"></div>
            <div class="content-2">
                <div class="child-1"></div>
                <div class="child-2"></div>
            </div>
        </div>
    </main>
    <footer class="footer"></footer>
</body>
</html>
