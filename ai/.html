<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <!-- Left Side: Hero Section -->
        <section class="hero-section">
            <div class="logo">AMU</div>
            <div class="hero-content">
                <h1>Capturing Moments, Creating Memories</h1>
            </div>
        </section>

        <!-- Right Side: Registration Form -->
        <section class="form-section">
            <header>
                <h2>Create an account</h2>
                <p>Already have an account? <a href="#">Log in</a></p>
            </header>

            <form action="/register" method="POST">
                <div class="input-group">
                    <input type="text" placeholder="First name" required>
                    <input type="text" placeholder="Last name" required>
                </div>

                <input type="email" placeholder="Email" required>
                
                <div class="password-wrapper">
                    <input type="password" placeholder="Enter your password" required>
                    <!-- Icon for visibility toggle would go here -->
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-primary">Create account</button>

                <div class="divider">Or register with</div>

                <div class="social-auth">
                    <button type="button" class="btn-social">Google</button>
                    <button type="button" class="btn-social">Apple</button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>
