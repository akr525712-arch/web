<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../bootstrep/css/bootstrap.css">
</head>
<body>
    <div class="container mt-5 pt-5">
        <div class=" d-flex justify-content-between">
            <h1 class="btn btn-primry">Product List</h1>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">+Add Product</button>
        </div>
        <table class="table  mt-3 table-striped text-center align-middle ">
            <thead class="table-dark">
                <tr>
                    <th>#</th>                    
                    <th>Name</th>                    
                    <th>Price</th>                    
                    <th>file</th>                    
                    <th>Action</th>                    
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Product 1</td>
                    <td>$10.00</td>
                    <td><img src="https://via.placeholder.com/60" alt="Product 1" style="border-radius: 50%;"></td>
                    <td>
                        <button class="btn btn-success">View</button>
                        <button class="btn btn-danger">Delete</button>
                        <button class="btn btn-warning">Edit</button>
                    </td>
                </tr>
</tr><tr>
  <td>1</td>
  <td>Product 1</td>
  <td>$10.00</td>
  <td><img src="https://via.placeholder.com/60" alt="Product 1" style="border-radius: 50%;"></td>
  <td>
      <button class="btn btn-success">View</button>
      <button class="btn btn-danger">Delete</button>
      <button class="btn btn-warning">Edit</button>
  </td>
</tr>
            </tbody>
        </table>
    </div>
    <!-- modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Product</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="addProductForm">
                <div class="mb-3">
                  <label for="productName" class="form-label">Product Name</label>
                  <input type="text" class="form-control" id="productName" placeholder="Enter product name" required>
                </div>
                <div class="mb-3">
                  <label for="productPrice" class="form-label">Price</label>
                  <input type="number" class="form-control" id="productPrice" placeholder="0.00" step="0.01" required>
                </div>
                <div class="mb-3">
                  <label for="productImage" class="form-label">Image URL</label>
                  <input type="url" class="form-control" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button type="submit" form="addProductForm" class="btn btn-primary">Add Product</button>
            </div>
          </div>
        </div>
      </div>
      
</body>
<script src="../bootstrep/js/bootstrap.bundle.js"></script>
</html>
