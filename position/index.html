<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<style>
    .static{
        width: 100vw;
        height: 100px;
        background-color: black;
        position: static;
        top: 50px;
    }
    .prerent{
        width: 100%;
        height: 100%;
        background-color: rgb(126, 118, 118);
        position: absolute;
       
    }
    .chail{
        width: 100px;
        height: 100px;
        background-color: red;
        position: relative;
        top: 50%;
        left: 50%;
    }
</style>
<body>
    <div class="static"></div>
    <div class="prerent">
        <div class="chail"></div>
    </div>

</body>
</html>
